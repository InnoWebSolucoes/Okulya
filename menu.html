<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Menu — Espaço Luanda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #1a1008;
      overflow: hidden;
      width: 100vw;
      height: 100svh;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── TOP NAV ─────────────────────────────────────────────────── */
    #top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 2rem;
      background: linear-gradient(to bottom, rgba(26,16,8,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    #top-nav a, #top-nav button { pointer-events: auto; }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.55rem;
      color: rgba(250,248,244,0.5); text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.56rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: color 0.22s ease;
      background: none; border: none; cursor: pointer;
      user-select: none; -webkit-user-select: none;
    }
    .back-link:hover { color: #c8a06a; }
    .nav-logo { height: 40px; width: auto; display: block; }

    /* ── SPHERE VIEW ─────────────────────────────────────────────── */
    #sphere-view {
      position: fixed; inset: 0; z-index: 1;
      transition: opacity 0.5s ease;
    }
    #sphere-view.fading { opacity: 0; pointer-events: none; }

    #infinite-grid-menu-canvas {
      width: 100%; height: 100%;
      display: block; cursor: grab; outline: none;
    }
    #infinite-grid-menu-canvas:active { cursor: grabbing; }

    #sphere-hint {
      position: absolute; bottom: 3rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.48rem; font-weight: 400;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(250,248,244,0.3);
      pointer-events: none; white-space: nowrap;
      transition: opacity 0.8s ease;
    }
    #sphere-hint.gone { opacity: 0; }

    /* ── SPHERE ITEM OVERLAYS ────────────────────────────────────── */
    .face-title {
      position: absolute; left: 50%; top: 22%;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      color: #faf8f4; line-height: 1.05;
      letter-spacing: -0.01em;
      text-align: center;
      cursor: pointer; user-select: none; -webkit-user-select: none;
      white-space: nowrap;
    }
    .face-title.active {
      opacity: 1; transform: translateX(-50%);
      pointer-events: auto;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .face-title.inactive {
      opacity: 0; transform: translate(-50%, -12px);
      pointer-events: none;
      transition: opacity 0.12s ease, transform 0.12s ease;
    }

    .face-description {
      position: absolute; left: 50%; top: 73%;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(250,248,244,0.55);
      text-align: center; white-space: nowrap;
      cursor: pointer; user-select: none; -webkit-user-select: none;
    }
    .face-description.active {
      opacity: 1; transform: translateX(-50%);
      pointer-events: auto;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .face-description.inactive {
      opacity: 0; transform: translate(-50%, 8px);
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .action-button {
      position: absolute; left: 50%;
      width: 50px; height: 50px; border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(200,160,106,0.65);
      display: grid; place-items: center;
      cursor: pointer; transform: translateX(-50%);
      transition: background 0.22s ease, border-color 0.22s ease,
                  opacity 0.5s ease, bottom 0.5s ease;
    }
    .action-button:hover { background: rgba(200,160,106,0.14); border-color: #c8a06a; }
    .action-button-icon {
      color: #c8a06a; font-size: 1.25rem; line-height: 1;
      position: relative; top: 1px; user-select: none;
    }
    .action-button.active { bottom: 4rem; opacity: 1; pointer-events: auto; }
    .action-button.inactive { bottom: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.12s ease, bottom 0.12s ease; }

    /* ── CATEGORY VIEW ───────────────────────────────────────────── */
    #cat-view {
      position: fixed; inset: 0; z-index: 200;
      background: #1a1008;
      opacity: 0; transform: translateY(28px);
      pointer-events: none;
      transition: opacity 0.55s ease, transform 0.55s ease;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #cat-view.visible {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }

    #cat-header {
      padding: 5rem 2.4rem 2.4rem;
      border-bottom: 1px solid rgba(200,160,106,0.14);
      position: relative;
    }
    #cat-back {
      background: none; border: none; padding: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.54rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(250,248,244,0.38);
      cursor: pointer; text-align: left;
      display: none;
      align-items: center; gap: 0.55rem;
      margin-bottom: 2rem;
      transition: color 0.22s ease;
      user-select: none; -webkit-user-select: none;
    }
    #cat-back:hover { color: #c8a06a; }

    #cat-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(2.8rem, 10vw, 5rem);
      color: #faf8f4; line-height: 0.95;
      letter-spacing: -0.02em;
    }
    #cat-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.54rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #c8a06a; margin-top: 1rem;
    }
    .cat-orn {
      width: 30px; height: 1px;
      background: linear-gradient(to right, #c8a06a, transparent);
      margin-top: 2rem;
    }

    #cat-items { padding: 0 2.4rem 5rem; }

    .menu-item {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 1rem;
      padding: 1.9rem 0;
      border-bottom: 1px solid rgba(250,248,244,0.05);
      transition: background 0.18s ease;
    }
    .menu-item:last-child { border-bottom: none; }

    .menu-item-left { flex: 1; }
    .menu-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 1.55rem;
      color: #faf8f4; line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .menu-item-desc {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.64rem; font-weight: 300;
      line-height: 1.8; color: rgba(250,248,244,0.42);
      margin-top: 0.45rem;
    }
    .menu-item-price {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem; font-weight: 500;
      letter-spacing: 0.1em; color: #c8a06a;
      white-space: nowrap; padding-top: 0.35rem;
      flex-shrink: 0;
    }

    /* ── MOBILE: stack title / desc vertically ───────────────────── */
    @media (max-width: 600px) {
      .face-title { font-size: clamp(1.5rem, 6vw, 2.2rem); }
      #cat-header { padding: 6rem 1.6rem 2rem; }
      #cat-items { padding: 0 1.6rem 5rem; }
    }
  </style>
</head>

      { image: 'dining-1.webp', link: 'entradas',   title: 'Entradas',          description: 'Petiscos & Sopas'   },

    /* ════════════════════════════════════════════════════════════
       VIEW SWITCHING
    ════════════════════════════════════════════════════════════ */
    let activeLink = null;

    function showCategory(key) {
      const data = MENU[key];
      if (!data) return;

      document.getElementById('cat-title').textContent = data.title;
      document.getElementById('cat-sub').textContent   = data.sub;

      const list = document.getElementById('cat-items');
      list.innerHTML = data.items.map(it => `
        <div class="menu-item">
          <div class="menu-item-left">
            <p class="menu-item-name">${it.name}</p>
            <p class="menu-item-desc">${it.desc}</p>
          </div>
          <p class="menu-item-price">${it.price}</p>
        </div>
      `).join('');

      document.getElementById('cat-view').classList.add('visible');
      document.getElementById('sphere-view').classList.add('fading');

      // Switch nav back button to go back to sphere
      const navBack = document.getElementById('nav-back');
      navBack.removeEventListener('click', navBack._handler || (() => {}));
      navBack._handler = (e) => { e.preventDefault(); backToSphere(); };
      navBack.addEventListener('click', navBack._handler);
    }

    function backToSphere() {
      document.getElementById('cat-view').classList.remove('visible');
      document.getElementById('sphere-view').classList.remove('fading');

      // Restore nav back link to index.html
      const navBack = document.getElementById('nav-back');
      navBack.removeEventListener('click', navBack._handler || (() => {}));
      navBack.href = 'index.html';
    }

    document.getElementById('cat-back').addEventListener('click', backToSphere);

    /* ════════════════════════════════════════════════════════════
       INFINITE MENU — WEBGL COMPONENT (ported from React Bits)
    ════════════════════════════════════════════════════════════ */
    const discVertShaderSource = `#version 300 es
uniform mat4 uWorldMatrix;
uniform mat4 uViewMatrix;
uniform mat4 uProjectionMatrix;
uniform vec3 uCameraPosition;
uniform vec4 uRotationAxisVelocity;
in vec3 aModelPosition;
in vec3 aModelNormal;
in vec2 aModelUvs;
in mat4 aInstanceMatrix;
out vec2 vUvs;
out float vAlpha;
flat out int vInstanceId;
#define PI 3.141593
void main() {
    vec4 worldPosition = uWorldMatrix * aInstanceMatrix * vec4(aModelPosition, 1.);
    vec3 centerPos = (uWorldMatrix * aInstanceMatrix * vec4(0., 0., 0., 1.)).xyz;
    float radius = length(centerPos.xyz);
    if (gl_VertexID > 0) {
        vec3 rotationAxis = uRotationAxisVelocity.xyz;
        float rotationVelocity = min(.15, uRotationAxisVelocity.w * 15.);
        vec3 stretchDir = normalize(cross(centerPos, rotationAxis));
        vec3 relativeVertexPos = normalize(worldPosition.xyz - centerPos);
        float strength = dot(stretchDir, relativeVertexPos);
        float invAbsStrength = min(0., abs(strength) - 1.);
        strength = rotationVelocity * sign(strength) * abs(invAbsStrength * invAbsStrength * invAbsStrength + 1.);
        worldPosition.xyz += stretchDir * strength;
    }
    worldPosition.xyz = radius * normalize(worldPosition.xyz);
    gl_Position = uProjectionMatrix * uViewMatrix * worldPosition;
    vAlpha = smoothstep(0.5, 1., normalize(worldPosition.xyz).z) * .9 + .1;
    vUvs = aModelUvs;
    vInstanceId = gl_InstanceID;
}`;

    const discFragShaderSource = `#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform int uItemCount;
uniform int uAtlasSize;
out vec4 outColor;
in vec2 vUvs;
in float vAlpha;
flat in int vInstanceId;
void main() {
    int itemIndex = vInstanceId % uItemCount;
    int cellsPerRow = uAtlasSize;
    int cellX = itemIndex % cellsPerRow;
    int cellY = itemIndex / cellsPerRow;
    vec2 cellSize = vec2(1.0) / vec2(float(cellsPerRow));
    vec2 cellOffset = vec2(float(cellX), float(cellY)) * cellSize;
    ivec2 texSize = textureSize(uTex, 0);
    float imageAspect = float(texSize.x) / float(texSize.y);
    float containerAspect = 1.0;
    float scale = max(imageAspect / containerAspect, containerAspect / imageAspect);
    vec2 st = vec2(vUvs.x, 1.0 - vUvs.y);
    st = (st - 0.5) * scale + 0.5;
    st = clamp(st, 0.0, 1.0);
    st = st * cellSize + cellOffset;
    outColor = texture(uTex, st);
    outColor.a *= vAlpha;
}`;

    class Face { constructor(a,b,c){this.a=a;this.b=b;this.c=c;} }

    class Vertex {
      constructor(x,y,z){
        this.position=vec3.fromValues(x,y,z);
        this.normal=vec3.create();
        this.uv=vec2.create();
      }
    }

    class Geometry {
      constructor(){this.vertices=[];this.faces=[];}
      addVertex(...args){
        for(let i=0;i<args.length;i+=3)
          this.vertices.push(new Vertex(args[i],args[i+1],args[i+2]));
        return this;
      }
      addFace(...args){
        for(let i=0;i<args.length;i+=3)
          this.faces.push(new Face(args[i],args[i+1],args[i+2]));
        return this;
      }
      get lastVertex(){return this.vertices[this.vertices.length-1];}
      subdivide(divisions=1){
        const cache={};let f=this.faces;
        for(let d=0;d<divisions;++d){
          const nf=new Array(f.length*4);
          f.forEach((face,ndx)=>{
            const mAB=this.getMidPoint(face.a,face.b,cache);
            const mBC=this.getMidPoint(face.b,face.c,cache);
            const mCA=this.getMidPoint(face.c,face.a,cache);
            const i=ndx*4;
            nf[i+0]=new Face(face.a,mAB,mCA);
            nf[i+1]=new Face(face.b,mBC,mAB);
            nf[i+2]=new Face(face.c,mCA,mBC);
            nf[i+3]=new Face(mAB,mBC,mCA);
          });
          f=nf;
        }
        this.faces=f;return this;
      }
      spherize(radius=1){
        this.vertices.forEach(v=>{
          vec3.normalize(v.normal,v.position);
          vec3.scale(v.position,v.normal,radius);
        });
        return this;
      }
      get vertexData(){return new Float32Array(this.vertices.flatMap(v=>Array.from(v.position)));}
      get normalData(){return new Float32Array(this.vertices.flatMap(v=>Array.from(v.normal)));}
      get uvData(){return new Float32Array(this.vertices.flatMap(v=>Array.from(v.uv)));}
      get indexData(){return new Uint16Array(this.faces.flatMap(f=>[f.a,f.b,f.c]));}
      get data(){return{vertices:this.vertexData,indices:this.indexData,normals:this.normalData,uvs:this.uvData};}
      getMidPoint(ndxA,ndxB,cache){
        const key=ndxA<ndxB?`k_${ndxB}_${ndxA}`:`k_${ndxA}_${ndxB}`;
        if(Object.prototype.hasOwnProperty.call(cache,key))return cache[key];
        const a=this.vertices[ndxA].position;
        const b=this.vertices[ndxB].position;
        const ndx=this.vertices.length;
        cache[key]=ndx;
        this.addVertex((a[0]+b[0])*.5,(a[1]+b[1])*.5,(a[2]+b[2])*.5);
        return ndx;
      }
    }

    class IcosahedronGeometry extends Geometry {
      constructor(){
        super();
        const t=Math.sqrt(5)*.5+.5;
        this.addVertex(-1,t,0,1,t,0,-1,-t,0,1,-t,0,0,-1,t,0,1,t,0,-1,-t,0,1,-t,t,0,-1,t,0,1,-t,0,-1,-t,0,1)
          .addFace(0,11,5,0,5,1,0,1,7,0,7,10,0,10,11,1,5,9,5,11,4,11,10,2,10,7,6,7,1,8,3,9,4,3,4,2,3,2,6,3,6,8,3,8,9,4,9,5,2,4,11,6,2,10,8,6,7,9,8,1);
      }
    }

    class DiscGeometry extends Geometry {
      constructor(steps=4,radius=1){
        super();
        steps=Math.max(4,steps);
        const alpha=(2*Math.PI)/steps;
        this.addVertex(0,0,0);
        this.lastVertex.uv[0]=.5;this.lastVertex.uv[1]=.5;
        for(let i=0;i<steps;++i){
          const x=Math.cos(alpha*i),y=Math.sin(alpha*i);
          this.addVertex(radius*x,radius*y,0);
          this.lastVertex.uv[0]=x*.5+.5;this.lastVertex.uv[1]=y*.5+.5;
          if(i>0)this.addFace(0,i,i+1);
        }
        this.addFace(0,steps,1);
      }
    }

    function createShader(gl,type,source){
      const s=gl.createShader(type);
      gl.shaderSource(s,source);gl.compileShader(s);
      if(gl.getShaderParameter(s,gl.COMPILE_STATUS))return s;
      console.error(gl.getShaderInfoLog(s));gl.deleteShader(s);return null;
    }

    function createProgram(gl,sources,tfv,attribLocs){
      const p=gl.createProgram();
      [gl.VERTEX_SHADER,gl.FRAGMENT_SHADER].forEach((t,i)=>{
        const s=createShader(gl,t,sources[i]);
        if(s)gl.attachShader(p,s);
      });
      if(tfv)gl.transformFeedbackVaryings(p,tfv,gl.SEPARATE_ATTRIBS);
      if(attribLocs)for(const a in attribLocs)gl.bindAttribLocation(p,attribLocs[a],a);
      gl.linkProgram(p);
      if(gl.getProgramParameter(p,gl.LINK_STATUS))return p;
      console.error(gl.getProgramInfoLog(p));gl.deleteProgram(p);return null;
    }

    function makeVertexArray(gl,pairs,indices){
      const va=gl.createVertexArray();gl.bindVertexArray(va);
      for(const [buf,loc,n] of pairs){
        if(loc===-1)continue;
        gl.bindBuffer(gl.ARRAY_BUFFER,buf);
        gl.enableVertexAttribArray(loc);
        gl.vertexAttribPointer(loc,n,gl.FLOAT,false,0,0);
      }
      if(indices){
        const ib=gl.createBuffer();
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);
        gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(indices),gl.STATIC_DRAW);
      }
      gl.bindVertexArray(null);return va;
    }

    function resizeCanvas(canvas){
      const dpr=Math.min(2,window.devicePixelRatio);
      const w=Math.round(canvas.clientWidth*dpr);
      const h=Math.round(canvas.clientHeight*dpr);
      if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;return true;}
      return false;
    }

    function makeBuffer(gl,data,usage){
      const b=gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER,b);
      gl.bufferData(gl.ARRAY_BUFFER,data,usage);
      gl.bindBuffer(gl.ARRAY_BUFFER,null);
      return b;
    }

    function makeTexture(gl,minF,magF,wS,wT){
      const t=gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D,t);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,wS);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,wT);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,minF);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,magF);
      return t;
    }

    /* ── ArcballControl ──────────────────────────────────────── */
    class ArcballControl {
      isPointerDown=false;
      orientation=quat.create();
      pointerRotation=quat.create();
      rotationVelocity=0;
      rotationAxis=vec3.fromValues(1,0,0);
      snapDirection=vec3.fromValues(0,0,-1);
      snapTargetDirection=null;
      EPSILON=0.1;
      IDENTITY_QUAT=quat.create();

      constructor(canvas,cb){
        this.canvas=canvas;this.updateCallback=cb||(() => null);
        this.pointerPos=vec2.create();
        this.previousPointerPos=vec2.create();
        this._rotationVelocity=0;
        this._combinedQuat=quat.create();

        canvas.addEventListener('pointerdown',e=>{
          vec2.set(this.pointerPos,e.clientX,e.clientY);
          vec2.copy(this.previousPointerPos,this.pointerPos);
          this.isPointerDown=true;
        });
        canvas.addEventListener('pointerup',()=>{this.isPointerDown=false;});
        canvas.addEventListener('pointerleave',()=>{this.isPointerDown=false;});
        canvas.addEventListener('pointermove',e=>{
          if(this.isPointerDown)vec2.set(this.pointerPos,e.clientX,e.clientY);
        });
        canvas.style.touchAction='none';
      }

      update(dt,tfd=16){
        const ts=dt/tfd+0.00001;
        let af=ts;
        const snap=quat.create();
        if(this.isPointerDown){
          const INT=0.3*ts;const AMP=5/ts;
          const mid=vec2.sub(vec2.create(),this.pointerPos,this.previousPointerPos);
          vec2.scale(mid,mid,INT);
          if(vec2.sqrLen(mid)>this.EPSILON){
            vec2.add(mid,this.previousPointerPos,mid);
            const p=this.#project(mid);const q=this.#project(this.previousPointerPos);
            const a=vec3.normalize(vec3.create(),p);const b=vec3.normalize(vec3.create(),q);
            vec2.copy(this.previousPointerPos,mid);
            af*=AMP;
            this.quatFromVectors(a,b,this.pointerRotation,af);
          } else {
            quat.slerp(this.pointerRotation,this.pointerRotation,this.IDENTITY_QUAT,INT);
          }
        } else {
          const INT=0.1*ts;
          quat.slerp(this.pointerRotation,this.pointerRotation,this.IDENTITY_QUAT,INT);
          if(this.snapTargetDirection){
            const SNAP=0.2;const a=this.snapTargetDirection;const b=this.snapDirection;
            const sd=vec3.squaredDistance(a,b);
            const df=Math.max(0.1,1-sd*10);af*=SNAP*df;
            this.quatFromVectors(a,b,snap,af);
          }
        }
        const cq=quat.multiply(quat.create(),snap,this.pointerRotation);
        this.orientation=quat.multiply(quat.create(),cq,this.orientation);
        quat.normalize(this.orientation,this.orientation);
        const RAI=0.8*ts;
        quat.slerp(this._combinedQuat,this._combinedQuat,cq,RAI);
        quat.normalize(this._combinedQuat,this._combinedQuat);
        const rad=Math.acos(this._combinedQuat[3])*2;
        const s=Math.sin(rad/2);
        let rv=0;
        if(s>0.000001){
          rv=rad/(2*Math.PI);
          this.rotationAxis[0]=this._combinedQuat[0]/s;
          this.rotationAxis[1]=this._combinedQuat[1]/s;
          this.rotationAxis[2]=this._combinedQuat[2]/s;
        }
        const RVI=0.5*ts;
        this._rotationVelocity+=(rv-this._rotationVelocity)*RVI;
        this.rotationVelocity=this._rotationVelocity/ts;
        this.updateCallback(dt);
      }

      quatFromVectors(a,b,out,af=1){
        const axis=vec3.cross(vec3.create(),a,b);
        vec3.normalize(axis,axis);
        const d=Math.max(-1,Math.min(1,vec3.dot(a,b)));
        const angle=Math.acos(d)*af;
        quat.setAxisAngle(out,axis,angle);
        return{q:out,axis,angle};
      }

      #project(pos){
        const r=2;const w=this.canvas.clientWidth;const h=this.canvas.clientHeight;
        const s=Math.max(w,h)-1;
        const x=(2*pos[0]-w-1)/s;const y=(2*pos[1]-h-1)/s;
        let z=0;const xySq=x*x+y*y;const rSq=r*r;
        if(xySq<=rSq/2)z=Math.sqrt(rSq-xySq);
        else z=rSq/Math.sqrt(xySq);
        return vec3.fromValues(-x,y,z);
      }
    }

    /* ── InfiniteGridMenu ────────────────────────────────────── */
    class InfiniteGridMenu {
      TFD=1000/60;SPHERE_RADIUS=2;
      #time=0;#dt=0;#dFrames=0;#frames=0;
      camera={
        matrix:mat4.create(),near:.1,far:40,fov:Math.PI/4,aspect:1,
        position:vec3.fromValues(0,0,3),up:vec3.fromValues(0,1,0),
        matrices:{view:mat4.create(),projection:mat4.create(),inversProjection:mat4.create()}
      };
      nearestVertexIndex=null;smoothRotVelocity=0;scaleFactor=1;movementActive=false;

      constructor(canvas,items,onActive,onMove,onInit=null,scale=1){
        this.canvas=canvas;this.items=items||[];
        this.onActive=onActive||(() => {});
        this.onMove=onMove||(() => {});
        this.scaleFactor=scale;this.camera.position[2]=3*scale;
        this.#init(onInit);
      }

      resize(){
        this.viewportSize=vec2.set(this.viewportSize||vec2.create(),this.canvas.clientWidth,this.canvas.clientHeight);
        const gl=this.gl;const changed=resizeCanvas(gl.canvas);
        if(changed)gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);
        this.#updateProjection(gl);
      }

      run(time=0){
        this.#dt=Math.min(32,time-this.#time);this.#time=time;
        this.#dFrames=this.#dt/this.TFD;this.#frames+=this.#dFrames;
        this.#animate(this.#dt);this.#render();
        requestAnimationFrame(t=>this.run(t));
      }

      #init(onInit){
        this.gl=this.canvas.getContext('webgl2',{antialias:true,alpha:false});
        const gl=this.gl;
        if(!gl)throw new Error('No WebGL 2 context!');
        this.viewportSize=vec2.fromValues(this.canvas.clientWidth,this.canvas.clientHeight);

        this.prog=createProgram(gl,[discVertShaderSource,discFragShaderSource],null,{
          aModelPosition:0,aModelNormal:1,aModelUvs:2,aInstanceMatrix:3
        });
        this.locs={
          aModelPosition:gl.getAttribLocation(this.prog,'aModelPosition'),
          aModelUvs:gl.getAttribLocation(this.prog,'aModelUvs'),
          aInstanceMatrix:gl.getAttribLocation(this.prog,'aInstanceMatrix'),
          uWorldMatrix:gl.getUniformLocation(this.prog,'uWorldMatrix'),
          uViewMatrix:gl.getUniformLocation(this.prog,'uViewMatrix'),
          uProjectionMatrix:gl.getUniformLocation(this.prog,'uProjectionMatrix'),
          uCameraPosition:gl.getUniformLocation(this.prog,'uCameraPosition'),
          uRotationAxisVelocity:gl.getUniformLocation(this.prog,'uRotationAxisVelocity'),
          uTex:gl.getUniformLocation(this.prog,'uTex'),
          uFrames:gl.getUniformLocation(this.prog,'uFrames'),
          uItemCount:gl.getUniformLocation(this.prog,'uItemCount'),
          uAtlasSize:gl.getUniformLocation(this.prog,'uAtlasSize')
        };

        this.discGeo=new DiscGeometry(56,1);
        const db=this.discGeo.data;
        this.discVAO=makeVertexArray(gl,[
          [makeBuffer(gl,db.vertices,gl.STATIC_DRAW),this.locs.aModelPosition,3],
          [makeBuffer(gl,db.uvs,gl.STATIC_DRAW),this.locs.aModelUvs,2]
        ],db.indices);
        this.discIndicesCount=db.indices.length;

        const ico=new IcosahedronGeometry();
        ico.subdivide(1).spherize(this.SPHERE_RADIUS);
        this.instancePositions=ico.vertices.map(v=>v.position);
        this.DISC_COUNT=ico.vertices.length;
        this.#initInstances(this.DISC_COUNT);

        this.worldMatrix=mat4.create();
        this.#initTexture();
        this.control=new ArcballControl(this.canvas,dt=>this.#onCtrl(dt));
        this.#updateCamera();this.#updateProjection(gl);this.resize();
        if(onInit)onInit(this);
      }

      #initTexture(){
        const gl=this.gl;
        this.tex=makeTexture(gl,gl.LINEAR,gl.LINEAR,gl.CLAMP_TO_EDGE,gl.CLAMP_TO_EDGE);
        const count=Math.max(1,this.items.length);
        this.atlasSize=Math.ceil(Math.sqrt(count));
        const cvs=document.createElement('canvas');
        const ctx=cvs.getContext('2d');
        const cell=512;
        cvs.width=this.atlasSize*cell;cvs.height=this.atlasSize*cell;
        Promise.all(this.items.map(it=>new Promise(res=>{
          const img=new Image();img.crossOrigin='anonymous';
          img.onload=()=>res(img);img.src=it.image;
        }))).then(imgs=>{
          imgs.forEach((img,i)=>{
            const x=(i%this.atlasSize)*cell;
            const y=Math.floor(i/this.atlasSize)*cell;
            ctx.drawImage(img,x,y,cell,cell);
          });
          gl.bindTexture(gl.TEXTURE_2D,this.tex);
          gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,cvs);
          gl.generateMipmap(gl.TEXTURE_2D);
        });
      }

      #initInstances(count){
        const gl=this.gl;
        this.inst={
          arr:new Float32Array(count*16),
          mats:[],
          buf:gl.createBuffer()
        };
        for(let i=0;i<count;++i){
          const slice=new Float32Array(this.inst.arr.buffer,i*16*4,16);
          slice.set(mat4.create());this.inst.mats.push(slice);
        }
        gl.bindVertexArray(this.discVAO);
        gl.bindBuffer(gl.ARRAY_BUFFER,this.inst.buf);
        gl.bufferData(gl.ARRAY_BUFFER,this.inst.arr.byteLength,gl.DYNAMIC_DRAW);
        const bpm=16*4;
        for(let j=0;j<4;++j){
          const loc=this.locs.aInstanceMatrix+j;
          gl.enableVertexAttribArray(loc);
          gl.vertexAttribPointer(loc,4,gl.FLOAT,false,bpm,j*4*4);
          gl.vertexAttribDivisor(loc,1);
        }
        gl.bindBuffer(gl.ARRAY_BUFFER,null);gl.bindVertexArray(null);
      }

      #animate(dt){
        const gl=this.gl;this.control.update(dt,this.TFD);
        const positions=this.instancePositions.map(p=>vec3.transformQuat(vec3.create(),p,this.control.orientation));
        const scale=0.25;const SI=0.6;
        positions.forEach((p,i)=>{
          const s=(Math.abs(p[2])/this.SPHERE_RADIUS)*SI+(1-SI);
          const fs=s*scale;
          const m=mat4.create();
          mat4.multiply(m,m,mat4.fromTranslation(mat4.create(),vec3.negate(vec3.create(),p)));
          mat4.multiply(m,m,mat4.targetTo(mat4.create(),[0,0,0],p,[0,1,0]));
          mat4.multiply(m,m,mat4.fromScaling(mat4.create(),[fs,fs,fs]));
          mat4.multiply(m,m,mat4.fromTranslation(mat4.create(),[0,0,-this.SPHERE_RADIUS]));
          mat4.copy(this.inst.mats[i],m);
        });
        gl.bindBuffer(gl.ARRAY_BUFFER,this.inst.buf);
        gl.bufferSubData(gl.ARRAY_BUFFER,0,this.inst.arr);
        gl.bindBuffer(gl.ARRAY_BUFFER,null);
        this.smoothRotVelocity=this.control.rotationVelocity;
      }

      #render(){
        const gl=this.gl;gl.useProgram(this.prog);
        gl.enable(gl.CULL_FACE);gl.enable(gl.DEPTH_TEST);
        /* brand dark brown background */
        gl.clearColor(26/255,16/255,8/255,1);
        gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
        gl.uniformMatrix4fv(this.locs.uWorldMatrix,false,this.worldMatrix);
        gl.uniformMatrix4fv(this.locs.uViewMatrix,false,this.camera.matrices.view);
        gl.uniformMatrix4fv(this.locs.uProjectionMatrix,false,this.camera.matrices.projection);
        gl.uniform3f(this.locs.uCameraPosition,...this.camera.position);
        gl.uniform4f(this.locs.uRotationAxisVelocity,
          this.control.rotationAxis[0],this.control.rotationAxis[1],
          this.control.rotationAxis[2],this.smoothRotVelocity*1.1);
        gl.uniform1i(this.locs.uItemCount,this.items.length);
        gl.uniform1i(this.locs.uAtlasSize,this.atlasSize);
        gl.uniform1f(this.locs.uFrames,this.#frames);
        gl.uniform1i(this.locs.uTex,0);
        gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,this.tex);
        gl.bindVertexArray(this.discVAO);
        gl.drawElementsInstanced(gl.TRIANGLES,this.discIndicesCount,gl.UNSIGNED_SHORT,0,this.DISC_COUNT);
      }

      #updateCamera(){
        mat4.targetTo(this.camera.matrix,this.camera.position,[0,0,0],this.camera.up);
        mat4.invert(this.camera.matrices.view,this.camera.matrix);
      }

      #updateProjection(gl){
        this.camera.aspect=gl.canvas.clientWidth/gl.canvas.clientHeight;
        const h=this.SPHERE_RADIUS*0.35;const d=this.camera.position[2];
        this.camera.fov=this.camera.aspect>1
          ?2*Math.atan(h/d)
          :2*Math.atan(h/this.camera.aspect/d);
        mat4.perspective(this.camera.matrices.projection,this.camera.fov,this.camera.aspect,this.camera.near,this.camera.far);
        mat4.invert(this.camera.matrices.inversProjection,this.camera.matrices.projection);
      }

      #onCtrl(dt){
        const ts=dt/this.TFD+0.0001;
        let damp=5/ts;let camZ=3*this.scaleFactor;
        const moving=this.control.isPointerDown||Math.abs(this.smoothRotVelocity)>0.01;
        if(moving!==this.movementActive){this.movementActive=moving;this.onMove(moving);}
        if(!this.control.isPointerDown){
          const ni=this.#nearestVertex();
          const idx=ni%Math.max(1,this.items.length);
          this.onActive(idx);
          const sd=vec3.normalize(vec3.create(),this.#vertexWorldPos(ni));
          this.control.snapTargetDirection=sd;
        } else {
          camZ+=this.control.rotationVelocity*80+2.5;damp=7/ts;
        }
        this.camera.position[2]+=(camZ-this.camera.position[2])/damp;
        this.#updateCamera();
      }

      #nearestVertex(){
        const n=this.control.snapDirection;
        const inv=quat.conjugate(quat.create(),this.control.orientation);
        const nt=vec3.transformQuat(vec3.create(),n,inv);
        let maxD=-1;let best=0;
        for(let i=0;i<this.instancePositions.length;++i){
          const d=vec3.dot(nt,this.instancePositions[i]);
          if(d>maxD){maxD=d;best=i;}
        }
        return best;
      }

      #vertexWorldPos(i){
        return vec3.transformQuat(vec3.create(),this.instancePositions[i],this.control.orientation);
      }
    }

    /* ════════════════════════════════════════════════════════════
       INIT — wire everything up
    ════════════════════════════════════════════════════════════ */
    const titleEl  = document.getElementById('face-title');
    const descEl   = document.getElementById('face-desc');
    const btnEl    = document.getElementById('action-btn');
    const hintEl   = document.getElementById('sphere-hint');
    let hintDismissed = false;

    function setActive(idx) {
      const item = SPHERE_ITEMS[idx];
      titleEl.textContent  = item.title;
      descEl.textContent   = item.description;
      titleEl.dataset.link = item.link;
      btnEl.dataset.link   = item.link;
    }

    function setMoving(moving) {
      const s = moving ? 'inactive' : 'active';
      titleEl.className = `face-title ${s}`;
      descEl.className  = `face-description ${s}`;
      btnEl.className   = `action-button ${s}`;
      if (!hintDismissed) { hintDismissed = true; hintEl.classList.add('gone'); }
    }

    function openCategory() {
      const key = titleEl.dataset.link;
      if (key) showCategory(key);
    }

    titleEl.addEventListener('click', openCategory);
    descEl.addEventListener('click',  openCategory);
    btnEl.addEventListener('click',   openCategory);

    const canvas = document.getElementById('infinite-grid-menu-canvas');
    const sketch = new InfiniteGridMenu(canvas, SPHERE_ITEMS, setActive, setMoving, sk => {
      setActive(0);
      setMoving(false);
      sk.run();
    });
    window.addEventListener('resize', () => sketch.resize());
  </script>
</body>
