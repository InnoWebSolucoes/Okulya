<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Menu — Okulya Café</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #482E2B;
      min-height: 100svh;
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
    }

    /* ── TOP NAV ─────────────────────────────────────────────────── */
    #top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 2rem;
      background: linear-gradient(to bottom, rgba(14,9,6,0.92) 0%, transparent 100%);
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.55rem;
      color: rgba(241,255,255,0.5); text-decoration: none;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.56rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: color 0.22s ease;
      background: none; border: none; cursor: pointer;
      padding: 1rem 1.4rem 1rem 0;
      margin: -1rem -1.4rem -1rem 0;
    }
    .back-link:hover { color: #ED9B23; }

    .nav-logo {
      height: 64px; width: auto; display: block; opacity: 0.88;
    }

    /* ── PICKER VIEW ─────────────────────────────────────────────── */
    #picker-view {
      min-height: 100svh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 7rem 2.4rem 4rem;
      transition: opacity 0.4s ease;
    }
    #picker-view.hidden { opacity: 0; pointer-events: none; }

    .picker-heading {
      font-family: 'Agbalumo', cursive;
      font-weight: 300;
      font-size: clamp(3.2rem, 12vw, 6rem);
      color: #F1FFFF;
      letter-spacing: -0.02em; line-height: 1;
      margin-bottom: 0.6rem;
    }

    .picker-rule {
      width: 36px; height: 1px;
      background: linear-gradient(to right, #ED9B23, transparent);
      margin-bottom: 3rem;
    }

    .cat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.6rem 0;
      border-top: 1px solid rgba(241,255,255,0.07);
      cursor: pointer; background: none; border-left: none; border-right: none; border-bottom: none;
      width: 100%; text-align: left;
      transition: background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-row:last-child { border-bottom: 1px solid rgba(241,255,255,0.07); }
    .cat-row:active { background: rgba(237,155,35,0.06); }

    .cat-row-left { display: flex; flex-direction: column; gap: 0.3rem; }

    .cat-row-name {
      font-family: 'Agbalumo', cursive;
      font-weight: 300;
      font-size: clamp(1.7rem, 5.5vw, 2.6rem);
      color: #F1FFFF; line-height: 1;
      letter-spacing: -0.01em;
    }

    .cat-row-sub {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.5rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #ED9B23;
    }

    .cat-row-arrow {
      color: rgba(241,255,255,0.2);
      flex-shrink: 0; margin-left: 1rem;
      transition: color 0.2s ease, transform 0.2s ease;
    }
    .cat-row:hover .cat-row-arrow,
    .cat-row:active .cat-row-arrow { color: #ED9B23; transform: translateX(4px); }

    /* ── CATEGORY DETAIL VIEW ────────────────────────────────────── */
    #cat-view {
      position: fixed; inset: 0; z-index: 200;
      background: #482E2B;
      opacity: 0; transform: translateY(28px);
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s ease;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #cat-view.visible {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }

    #cat-header {
      padding: 5.5rem 2.4rem 2.4rem;
      border-bottom: 1px solid rgba(237,155,35,0.12);
    }

    #cat-title {
      font-family: 'Agbalumo', cursive;
      font-weight: 300;
      font-size: clamp(2.8rem, 10vw, 5rem);
      color: #F1FFFF; line-height: 0.95;
      letter-spacing: -0.02em;
    }
    #cat-sub {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.52rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #ED9B23; margin-top: 0.9rem;
    }
    .cat-orn {
      width: 30px; height: 1px;
      background: linear-gradient(to right, #ED9B23, transparent);
      margin-top: 1.8rem;
    }

    #cat-items { padding: 0 2.4rem 5rem; }

    .menu-item {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 1.2rem;
      padding: 1.8rem 0;
      border-bottom: 1px solid rgba(241,255,255,0.05);
    }
    .menu-item:last-child { border-bottom: none; }

    .menu-item-left { flex: 1; }
    .menu-item-name {
      font-family: 'Agbalumo', cursive;
      font-weight: 300; font-size: 1.5rem;
      color: #F1FFFF; line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .menu-item-desc {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.62rem; font-weight: 300;
      line-height: 1.8; color: rgba(241,255,255,0.4);
      margin-top: 0.4rem;
    }
    .menu-item-price {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.56rem; font-weight: 500;
      letter-spacing: 0.1em; color: #ED9B23;
      white-space: nowrap; padding-top: 0.3rem;
      flex-shrink: 0;
    }

    /* ── WhatsApp widget ──────────────────────────────────────────── */
    #wa-widget {
      position: fixed; bottom: 1.6rem; right: 1.6rem;
      width: 54px; height: 54px; border-radius: 50%;
      background: #25D366;
      box-shadow: 0 4px 22px rgba(37,211,102,0.4), 0 1px 6px rgba(0,0,0,0.2);
      cursor: pointer; z-index: 9998;
      display: flex; align-items: center; justify-content: center;
      touch-action: none; user-select: none;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  opacity 0.35s ease;
    }
    #wa-widget:hover { transform: scale(1.1); }

    @media (max-width: 600px) {
      #picker-view  { padding: 6rem 1.6rem 3rem; }
      #cat-header   { padding: 6rem 1.6rem 2rem; }
      #cat-items    { padding: 0 1.6rem 5rem; }
    }
  </style>
</head>
<body>

  <!-- ── TOP NAV ──────────────────────────────────────────────── -->
  <nav id="top-nav">
    <a href="index.html" class="back-link" id="nav-back">
      <svg width="15" height="10" viewBox="0 0 15 10" fill="none" style="flex-shrink:0;">
        <line x1="14" y1="5" x2="1" y2="5" stroke="currentColor" stroke-width="0.85" stroke-linecap="round"/>
        <polyline points="5,1 1,5 5,9" stroke="currentColor" stroke-width="0.85" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Voltar
    </a>
    <img src="Brand Reasources/logo.png" class="nav-logo" alt="Okulya Café" />
    <a href="index.html#contact"
       style="font-family:'Quicksand',sans-serif;font-size:0.56rem;font-weight:500;
              letter-spacing:0.22em;text-transform:uppercase;color:rgba(241,255,255,0.45);
              text-decoration:none;transition:color 0.22s ease;"
       onmouseover="this.style.color='#ED9B23'" onmouseout="this.style.color='rgba(241,255,255,0.45)'">Contacto</a>
  </nav>

  <!-- ── CATEGORY PICKER ──────────────────────────────────────── -->
  <div id="picker-view">
    <h1 class="picker-heading">menu</h1>
    <div class="picker-rule"></div>

    <button class="cat-row" onclick="showCategory('entradas')">
      <div class="cat-row-left">
        <span class="cat-row-name">Entradas</span>
        <span class="cat-row-sub">Petiscos &amp; Sopas</span>
      </div>
      <svg class="cat-row-arrow" width="18" height="14" viewBox="0 0 18 14" fill="none">
        <line x1="1" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
        <polyline points="11,2 16,7 11,12" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="cat-row" onclick="showCategory('pratos')">
      <div class="cat-row-left">
        <span class="cat-row-name">Pratos Principais</span>
        <span class="cat-row-sub">Mar &amp; Terra</span>
      </div>
      <svg class="cat-row-arrow" width="18" height="14" viewBox="0 0 18 14" fill="none">
        <line x1="1" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
        <polyline points="11,2 16,7 11,12" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="cat-row" onclick="showCategory('sobremesas')">
      <div class="cat-row-left">
        <span class="cat-row-name">Sobremesas</span>
        <span class="cat-row-sub">Doces Finais</span>
      </div>
      <svg class="cat-row-arrow" width="18" height="14" viewBox="0 0 18 14" fill="none">
        <line x1="1" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
        <polyline points="11,2 16,7 11,12" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="cat-row" onclick="showCategory('bebidas')">
      <div class="cat-row-left">
        <span class="cat-row-name">Bebidas</span>
        <span class="cat-row-sub">Bar &amp; Carta de Vinhos</span>
      </div>
      <svg class="cat-row-arrow" width="18" height="14" viewBox="0 0 18 14" fill="none">
        <line x1="1" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
        <polyline points="11,2 16,7 11,12" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- ── CATEGORY DETAIL VIEW ─────────────────────────────────── -->
  <div id="cat-view">
    <div id="cat-header">
      <h1 id="cat-title"></h1>
      <p  id="cat-sub"></p>
      <div class="cat-orn"></div>
    </div>
    <div id="cat-items"></div>
  </div>

  <!-- ── WhatsApp Widget ──────────────────────────────────────── -->
  <div id="wa-widget" title="Falar connosco no WhatsApp">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
    </svg>
  </div>

  <script>
  (function() {
    var MENU = {
      entradas: { title:'Entradas', sub:'Para começar', items:[
        {name:'Caldo de Amendoim',   desc:'Caldo tradicional angolano com amendoim tostado e coentros frescos',          price:'1 500 Kz'},
        {name:'Camarão ao Alho',     desc:'Camarões salteados em azeite, alho laminado e piri-piri da casa',             price:'3 500 Kz'},
        {name:'Polvo Grelhado',      desc:'Polvo grelhado sobre puré de batata-doce com azeite de ervas',                price:'4 200 Kz'},
        {name:'Salada da Casa',      desc:'Folhas frescas, tomate, pepino, azeitona e vinagrete de limão',               price:'2 000 Kz'},
        {name:'Tábua de Fumados',    desc:'Seleção de enchidos artesanais com queijos curados e acompanhamentos',        price:'5 000 Kz'},
      ]},
      pratos: { title:'Pratos Principais', sub:'Mar & Terra', items:[
        {name:'Costela Premium',     desc:'Costela maturada 72 horas, fumada ao carvão com especiarias da casa',         price:'8 500 Kz'},
        {name:'Lagosta Grelhada',    desc:'Lagosta fresca grelhada com manteiga de ervas e limão galego',                price:'12 000 Kz'},
        {name:'Entrecosto Wagyu',    desc:'Wagyu A4 ao ponto, molho de vinho tinto e batata rústica assada',             price:'15 500 Kz'},
        {name:'Camarão Flambado',    desc:'Camarão jumbo flambado em aguardente com arroz de tomate e coentros',         price:'9 500 Kz'},
        {name:'Frango na Brasa',     desc:'Frango campestre marinado 24 horas, grelhado na brasa com piri-piri',         price:'6 000 Kz'},
      ]},
      sobremesas: { title:'Sobremesas', sub:'Doces finais', items:[
        {name:'Pudim de Coco',       desc:'Pudim cremoso de coco com calda de caramelo salgado e flor de sal',          price:'1 800 Kz'},
        {name:'Tarte de Chocolate',  desc:'Tarte de chocolate amargo com gelado de baunilha Madagascar',                price:'2 200 Kz'},
        {name:'Mousse de Maracujá',  desc:'Mousse aerada de maracujá fresco com coulis de frutas tropicais',            price:'1 600 Kz'},
        {name:'Frutos da Época',     desc:'Seleção de frutos tropicais frescos com mel de abelha e hortelã',            price:'1 400 Kz'},
        {name:'Semifrio de Amendoim',desc:'Semifrio artesanal com crocante de caramelo e amendoim tostado',             price:'2 000 Kz'},
      ]},
      bebidas: { title:'Bebidas', sub:'Bar & Carta de Vinhos', items:[
        {name:'Caipirinha da Casa',  desc:'Limão, açúcar mascavado e cachaça premium — clássica ou com fruta da época', price:'2 500 Kz'},
        {name:'Cocktail do Chefe',   desc:'Criação semanal exclusiva com destilados artesanais e frutas frescas',       price:'3 200 Kz'},
        {name:'Vinho Tinto da Casa', desc:'Seleção mensal de adegas parceiras — pergunte ao nosso sommelier',           price:'4 500 Kz / garrafa'},
        {name:'Cerveja Brava',       desc:'Cerveja angolana gelada, a escolha perfeita para as nossas costelas',        price:'1 200 Kz'},
        {name:'Sumos Naturais',      desc:'Espremidos na hora: maracujá, manga, laranja ou papaia',                     price:'1 000 Kz'},
      ]},
    };

    function renderItems(key) {
      var data = MENU[key]; if (!data) return;
      document.getElementById('cat-title').textContent = data.title;
      document.getElementById('cat-sub').textContent   = data.sub;
      document.getElementById('cat-items').innerHTML   = data.items.map(function(it){
        return '<div class="menu-item"><div class="menu-item-left">' +
          '<p class="menu-item-name">'+it.name+'</p>' +
          '<p class="menu-item-desc">'+it.desc+'</p></div>' +
          '<p class="menu-item-price">'+it.price+'</p></div>';
      }).join('');
    }

    function showCat(key) {
      if (!MENU[key]) return;
      renderItems(key);
      document.getElementById('cat-view').classList.add('visible');
      document.getElementById('picker-view').classList.add('hidden');
      var nb = document.getElementById('nav-back');
      nb._origHref = nb.href;
      nb.href = '#';
      nb.onclick = function(e) {
        e.preventDefault();
        hideCat();
      };
      if (history.pushState) history.pushState({ cat: key }, '', '#' + key);
    }

    function hideCat() {
      document.getElementById('cat-view').classList.remove('visible');
      document.getElementById('picker-view').classList.remove('hidden');
      var nb = document.getElementById('nav-back');
      nb.href = 'index.html';
      nb.onclick = null;
      if (history.pushState) history.pushState(null, '', location.pathname);
    }

    window.showCategory = showCat;

    window.addEventListener('popstate', function() {
      if (document.getElementById('cat-view').classList.contains('visible')) {
        hideCat();
      }
    });

    var h = (location.hash || '').replace('#', '');
    if (h && MENU[h]) showCat(h);

    // WhatsApp widget
    var wa = document.getElementById('wa-widget');
    if (!wa) return;
    var startX, startY, isDragging = false;
    var waUrl = 'https://wa.me/244933002904?text=Ol%C3%A1!%20Gostaria%20de%20saber%20mais%20sobre%20o%20Okulya%20Caf%C3%A9.';
    wa.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      wa.setPointerCapture(e.pointerId);
      startX = e.clientX; startY = e.clientY;
      isDragging = false;
      wa.style.transition = 'none';
    });
    wa.addEventListener('pointermove', function(e) {
      if (startX == null) return;
      var dx = e.clientX - startX, dy = e.clientY - startY;
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) isDragging = true;
      if (isDragging) wa.style.transform = 'translate('+dx+'px,'+dy+'px)';
    });
    wa.addEventListener('pointerup', function(e) {
      var dx = e.clientX - startX, dy = e.clientY - startY;
      if (isDragging && (Math.abs(dx) > 80 || Math.abs(dy) > 80)) {
        var fX = 0, fY = 0;
        if (Math.abs(dx) >= Math.abs(dy)) fX = dx > 0 ? 300 : -300;
        else fY = dy > 0 ? 300 : -300;
        wa.style.transition = 'transform 0.38s ease, opacity 0.38s ease';
        wa.style.transform = 'translate('+fX+'px,'+fY+'px)';
        wa.style.opacity = '0';
        setTimeout(function(){ wa.style.display = 'none'; }, 400);
      } else if (!isDragging) {
        wa.style.transition = '';
        wa.style.transform = '';
        window.open(waUrl, '_blank');
      } else {
        wa.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
        wa.style.transform = '';
      }
      startX = startY = null; isDragging = false;
    });
  })();
  </script>

</body>
</html>
