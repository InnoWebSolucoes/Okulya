<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobre — Okulya Café</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=ABeeZee:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #2D1B0E;
      color: #f5f0e8;
      overflow: hidden;
    }

    /* ── Grain texture overlay ─────────────────────────────────────────────── */
    .grain {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: 0.038;
    }

    /* ── Radial glow layers ────────────────────────────────────────────────── */
    .glow-wrap {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .glow-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80vmax; height: 80vmax;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(193,123,5,0.09) 0%,
        rgba(193,123,5,0.03) 38%,
        transparent 70%);
    }
    .glow-top {
      position: absolute;
      top: -20%; left: 20%;
      width: 60vmax; height: 60vmax;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(193,100,10,0.06) 0%,
        transparent 65%);
    }

    /* ── Page layout ───────────────────────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 3rem 2rem;
      text-align: center;
    }

    /* ── Logo ──────────────────────────────────────────────────────────────── */
    .logo-wrap {
      margin-bottom: 5rem;
      opacity: 0;
    }
    .logo-wrap img {
      height: 72px;
      width: auto;
    }

    /* ── Ornamental divider ────────────────────────────────────────────────── */
    .ornament {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2.6rem;
      opacity: 0;
    }
    .ornament-line {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(193,123,5,0.5));
    }
    .ornament-line.right {
      background: linear-gradient(90deg, rgba(193,123,5,0.5), transparent);
    }
    .ornament-diamond {
      width: 6px; height: 6px;
      background: #C17B05;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── Label ─────────────────────────────────────────────────────────────── */
    .label {
      font-family: 'ABeeZee', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #C17B05;
      margin-bottom: 1.6rem;
      opacity: 0;
    }

    /* ── Headline ───────────────────────────────────────────────────────────── */
    .headline {
      font-family: 'Agbalumo', cursive;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(3.6rem, 10vw, 8rem);
      color: #f5f0e8;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 2.2rem;
      opacity: 0;
      /* Layered text shadow for depth */
      text-shadow:
        0 2px 40px rgba(193,123,5,0.14),
        0 1px 0 rgba(0,0,0,0.6);
    }

    /* ── Sub copy ───────────────────────────────────────────────────────────── */
    .sub {
      font-family: 'Agbalumo', cursive;
      font-weight: 300;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      color: rgba(245,240,232,0.5);
      letter-spacing: 0.04em;
      line-height: 1.8;
      max-width: 36ch;
      margin-bottom: 4rem;
      opacity: 0;
    }

    /* ── Back link ──────────────────────────────────────────────────────────── */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.75rem;
      font-family: 'ABeeZee', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      text-decoration: none;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(193,123,5,0.2);
      opacity: 0;
      transition: color 0.28s ease, border-color 0.28s ease;
    }
    .back-link:hover {
      color: #C17B05;
      border-color: rgba(193,123,5,0.6);
    }
    .back-link:hover .arrow { transform: translateX(-4px); }
    .arrow {
      display: inline-block;
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
  </style>
</head>
<body>

  <!-- Grain texture -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>

  <!-- Glow layers -->
  <div class="glow-wrap">
    <div class="glow-center"></div>
    <div class="glow-top"></div>
  </div>

  <!-- Page content -->
  <div class="page">

    <!-- Logo -->
    <div class="logo-wrap" id="el-logo">
      <a href="index.html">
        <img src="Brand Reasources/logo.png" alt="Okulya Café" />
      </a>
    </div>

    <!-- Label -->
    <p class="label" id="el-label">A nossa história</p>

    <!-- Ornament -->
    <div class="ornament" id="el-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <!-- Headline -->
    <h1 class="headline" id="el-headline">Em Breve</h1>

    <!-- Sub copy -->
    <p class="sub" id="el-sub">
      Estamos a preparar algo especial.<br>
      Volte em breve para conhecer a nossa história.
    </p>

    <!-- Back link -->
    <a href="index.html" class="back-link" id="el-back">
      <span class="arrow">←</span>
      <span>Voltar ao início</span>
    </a>

  </div>

  <script>
    /* ── Set initial states ────────────────────────────────────────────────── */
    gsap.set(['#el-logo', '#el-label', '#el-headline', '#el-sub', '#el-back'], { opacity: 0, y: 22 });
    gsap.set('#el-ornament', { opacity: 0, scaleX: 0 });

    /* ── Entrance animation ────────────────────────────────────────────────── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#el-logo',     { opacity: 1, y: 0, duration: 0.7 }, 0.15)
      .to('#el-label',    { opacity: 1, y: 0, duration: 0.6 }, 0.4)
      .to('#el-ornament', { opacity: 1, scaleX: 1, duration: 0.55 }, 0.55)
      .to('#el-headline', { opacity: 1, y: 0, duration: 0.8 }, 0.62)
      .to('#el-sub',      { opacity: 1, y: 0, duration: 0.65 }, 0.82)
      .to('#el-back',     { opacity: 1, y: 0, duration: 0.5 }, 1.0);
  </script>

</body>
</html>
